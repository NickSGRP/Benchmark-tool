<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Firm Benchmark Analysis - Strategic Group</title>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
</style>

<!-- Copilot Studio Chatbot -->
<script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script>
<script>
let webChatInstance = null;
let directLineUrl = null;

const tokenEndpoint = "https://c231d862d5efea1996b05a3e59d2fd.c6.environment.api.powerplatform.com/powervirtualagents/botsbyschema/ca_agent/directline/token?api-version=2022-03-01-preview";

const styleOptions = {
  "accent": "#9E1F40",
  "autoScrollSnapOnPage": true,
  "avatarBorderRadius": "7%",
  "avatarSize": 40,
  "backgroundColor": "#e8e9eb",
  "botAvatarBackgroundColor": "#222222",
  "botAvatarInitials": "SGRP",
  "bubbleBackground": "#f0eded",
  "bubbleBorderColor": "#f5f5f5",
  "bubbleBorderRadius": 41,
  "bubbleBorderStyle": "solid",
  "bubbleBorderWidth": 1,
  "bubbleFromUserBackground": "#e0dede",
  "bubbleFromUserBorderColor": "#f5f5f5",
  "bubbleFromUserBorderRadius": 41,
  "bubbleFromUserBorderStyle": "solid",
  "bubbleFromUserBorderWidth": 1,
  "bubbleFromUserTextColor": "#000000",
  "bubbleTextColor": "#000000",
  "hideUploadButton": false,
  "sendBoxBackground": "#e8e9eb",
  "sendBoxBorderTop": "solid 1px #808080",
  "sendBoxButtonColor": "#9E1F40",
  "sendBoxButtonColorOnHover": "#D7335D",
  "sendBoxHeight": 60,
  "sendBoxTextColor": "#000000",
  "suggestedActionBackgroundColor": "#006FC4FF",
  "suggestedActionBorderRadius": 10,
  "suggestedActionTextColor": "#FFFFFFFF",
  "userAvatarBackgroundColor": "#222222",
  "userAvatarInitials": "USER"
};

document.addEventListener('DOMContentLoaded', () => {
  const root = document.documentElement;
  const baseColor = styleOptions.accent;
  const r = parseInt(baseColor.slice(1,3),16), g = parseInt(baseColor.slice(3,5),16), b = parseInt(baseColor.slice(5,7),16);
  const lighter = `#${Math.min(255,r+30).toString(16).padStart(2,'0')}${Math.min(255,g+30).toString(16).padStart(2,'0')}${Math.min(255,b+30).toString(16).padStart(2,'0')}`;
  const darker = `#${Math.max(0,r-30).toString(16).padStart(2,'0')}${Math.max(0,g-30).toString(16).padStart(2,'0')}${Math.max(0,b-30).toString(16).padStart(2,'0')}`;
  root.style.setProperty('--primary-color', `linear-gradient(135deg, ${lighter}, ${baseColor}, ${darker})`);
  root.style.setProperty('--header-textColor', '#FFFFFF');
});

const environmentEndPoint = tokenEndpoint.slice(0, tokenEndpoint.indexOf("/powervirtualagents"));
const apiVersion = tokenEndpoint.slice(tokenEndpoint.indexOf("api-version")).split("=")[1];
const regionalChannelSettingsURL = `${environmentEndPoint}/powervirtualagents/regionalchannelsettings?api-version=${apiVersion}`;

function showChat() {
  document.getElementById("chatbot-popup").classList.add("visible");
  document.getElementById("open-chat").classList.add("hidden");
}
function hideChat() {
  document.getElementById("chatbot-popup").classList.remove("visible");
  document.getElementById("open-chat").classList.remove("hidden");
}
function createCustomStore() {
  return window.WebChat.createStore({}, ({ dispatch }) => next => action => {
    if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
      dispatch({ type: "DIRECT_LINE/POST_ACTIVITY", meta: { method: "keyboard" }, payload: { activity: { channelData: { postBack: true }, name: "startConversation", type: "event" } } });
    }
    return next(action);
  });
}
async function restartConversation() {
  try {
    const response = await fetch(tokenEndpoint);
    const conversationInfo = await response.json();
    if (!conversationInfo.token) throw new Error("Failed to get token");
    const newDirectLine = window.WebChat.createDirectLine({ domain: `${directLineUrl}v3/directline`, token: conversationInfo.token });
    webChatInstance = window.WebChat.renderWebChat({ directLine: newDirectLine, styleOptions, store: createCustomStore() }, document.getElementById("webchat"));
  } catch (err) { console.error("Failed to restart:", err); }
}
async function initializeChat() {
  try {
    const response = await fetch(regionalChannelSettingsURL);
    const data = await response.json();
    directLineUrl = data.channelUrlsById.directline;
    if (!directLineUrl) throw new Error("Failed to get DirectLine URL");
    const conversationResponse = await fetch(tokenEndpoint);
    const conversationInfo = await conversationResponse.json();
    if (!conversationInfo.token) throw new Error("Failed to get token");
    const directLine = window.WebChat.createDirectLine({ domain: `${directLineUrl}v3/directline`, token: conversationInfo.token });
    webChatInstance = window.WebChat.renderWebChat({ directLine, styleOptions, store: createCustomStore() }, document.getElementById("webchat"));
  } catch (err) { console.error("Failed to initialize chat:", err); }
}
initializeChat();
</script>

<style>
:root { --chat-width: 450px; --chat-height: 520px; --header-height: 56px; --border-radius: 16px; }
#chatbot-popup {
  display: none; position: fixed; bottom: 32px; right: 32px;
  width: var(--chat-width); height: var(--chat-height);
  background: white; border-radius: var(--border-radius);
  box-shadow: 0 18px 40px -5px rgba(0,0,0,0.2); overflow: hidden;
  opacity: 0; transform-origin: bottom right; transform: scale(0.95);
  transition: all 0.3s ease-in-out; z-index: 999;
}
#chatbot-popup.visible { display: block; opacity: 1; transform: scale(1); }
#chatbot-header {
  background: var(--primary-color); padding: 16px 20px; height: var(--header-height);
  display: flex; justify-content: space-between; align-items: center; color: #fff;
}
.header-title { display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: 500; }
.header-buttons { display: flex; gap: 12px; align-items: center; }
.icon-button { background: none; border: none; color: #fff; cursor: pointer; padding: 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
.icon-button:hover { background: rgba(255,255,255,0.1); }
#webchat { height: calc(100% - var(--header-height)); background-color: #f9fafb; }
#open-chat {
  position: fixed; bottom: 32px; right: 32px; width: 64px; height: 64px;
  border-radius: 50%; background: var(--primary-color); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: all 0.3s ease-in-out; z-index: 998;
}
#open-chat.hidden { opacity: 0; transform: scale(0.95) translateY(10px); pointer-events: none; }
#open-chat:hover { transform: translateY(-4px); }
#open-chat svg { width: 28px; height: 28px; color: white; }
</style>
</head>
<body>

<div id="chatbot-popup" role="complementary" aria-label="Chat Assistant">
  <div id="chatbot-header">
    <div class="header-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>SGRP - AI Benchmark Assistant</span>
    </div>
    <div class="header-buttons">
      <button class="icon-button" onclick="restartConversation()" aria-label="Restart Conversation">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
          <path d="M3 3v5h5"></path>
        </svg>
      </button>
      <button class="icon-button" onclick="hideChat()" aria-label="Close Chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
  <div id="webchat" role="main"></div>
</div>

<button id="open-chat" onclick="showChat()" aria-label="Open Chat Assistant">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
  </svg>
</button>

<div id="root"></div>

<script type="text/babel" src="BenchmarkTool.jsx?v=3"></script>
</body>
</html>
